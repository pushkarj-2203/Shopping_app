# PriceWise — full local stack: Postgres + Redis + backend (FastAPI) + frontend (Next.js)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pricewise
      POSTGRES_PASSWORD: pricewise
      POSTGRES_DB: pricewise
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricewise"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_JSON: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://pricewise:pricewise@db:5432/pricewise
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    environment:
      ENVIRONMENT: production
      LOG_JSON: "true"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql+asyncpg://pricewise:pricewise@db:5432/pricewise
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
